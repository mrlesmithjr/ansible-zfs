---
- name: Samba | Install Samba
  ansible.builtin.apt:
    name: samba
    state: present
  when: ansible_os_family == "Debian"

- name: Samba | Configure Samba
  ansible.builtin.template:
    src: etc/samba/smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart samba
