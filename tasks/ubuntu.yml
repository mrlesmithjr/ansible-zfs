---
- name: Ubuntu | Add ZFS PPA
  ansible.builtin.apt_repository:
    repo: "{{ zfs_ubuntu_ppa }}"
    state: present
  when: >
    ansible_distribution_version <= '14.04'

- name: Ubuntu | Install ZFS ({{ ansible_distribution_version }} <= 14.04)
  ansible.builtin.apt:
    name: ubuntu-zfs
    state: present
  when: >
    ansible_distribution_version <= '14.04'

- name: Ubuntu | Ensure Ubuntu universe repo is enabled ({{ ansible_distribution_version }} >= 16.04)
  ansible.builtin.apt_repository:
    repo: "deb {{ ubuntu_apt_repository }} {{ ansible_distribution_release | lower }} universe"
    state: present
  when: >
    ansible_distribution_version >= '16.04'

- name: Ubuntu | Install ZFS ({{ ansible_distribution_version }} >= 16.04)
  ansible.builtin.apt:
    name: zfsutils-linux
    state: present
  when: >
    ansible_distribution_version >= '16.04'

- name: Ubuntu | Enable ZFS module
  community.general.modprobe:
    name: zfs
    state: present

- name: Ubuntu | Install iscsitarget (if enabled)
  ansible.builtin.apt:
    name:
      - iscsitarget
      - iscsitarget-dkms
    state: present
  when: >
    zfs_enable_iscsi is defined and
    zfs_enable_iscsi

- name: Ubuntu | Uninstall iscsitarget (if not enabled)
  ansible.builtin.apt:
    name:
      - iscsitarget
      - iscsitarget-dkms
    state: absent
  when: >
    zfs_enable_iscsi is defined and
    not zfs_enable_iscsi

- name: Ubuntu | Configure iscsitarget service
  ansible.builtin.template:
    src: etc/default/iscsitarget.j2
    dest: /etc/default/iscsitarget
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart iscsitarget
  when: >
    zfs_enable_iscsi is defined and
    zfs_enable_iscsi

- name: Ubuntu | Install NFS (if enabled)
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
  when: >
    zfs_enable_nfs is defined and
    zfs_enable_nfs

- name: Ubuntu | Uninstall NFS (if not enabled)
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: absent
  when: >
    zfs_enable_nfs is defined and
    not zfs_enable_nfs

- name: Ubuntu | Configure NFS Kernel Server
  ansible.builtin.template:
    src: etc/exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart nfs-kernel-server
    - Start zfs-share
  when: >
    zfs_enable_nfs is defined and
    zfs_enable_nfs

- name: Ubuntu | Configure ZFS
  ansible.builtin.template:
    src: etc/default/zfs.j2
    dest: /etc/default/zfs
    owner: root
    group: root
    mode: "0644"
  notify:
    - Start zfs-share

- name: Ubuntu | Check for ZFS-Auto-Snapshot package from the distribution
  ansible.builtin.command: apt-cache show zfs-auto-snapshot
  ignore_errors: true
  register: auto_snapshot
  when: zfs_enable_auto_snapshots
  changed_when: false
  failed_when: false
  check_mode: false

- name: Ubuntu | Add ZFS-Auto-Snapshot Repo
  ansible.builtin.apt_repository:
    repo: ppa:bob-ziuchkovski/zfs-auto-snapshot
    state: present
  when: >
    zfs_enable_auto_snapshots and
    auto_snapshot.stderr == 'E: No packages found'

- name: Ubuntu | Install ZFS-Auto-Snapshot
  ansible.builtin.apt:
    name: zfs-auto-snapshot
    state: present
  when: zfs_enable_auto_snapshots
