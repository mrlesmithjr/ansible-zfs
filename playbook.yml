---
- name: Installs ZFS On Linux
  hosts: all
  become: true
  vars:
    # define your FQDN in reverse...(local.vagrant)
    - zfs_iscsistarget_iqn: iqn.2001-04.local.vagrant
    - zfs_iscsitarget_target_portals:
        - 192.168.202.0/24
    - zfs_enable_iscsi: true
    - zfs_enable_nfs: true
    # defines if paramaters defined in zfs_performance_tuning are applied
    - zfs_enable_performance_tuning: true
    # defines zpool(s) to manage
    - zfs_pools:
        - name: tank
          #    atime: 'on'
          # on | off (default) | lzjb | gzip | gzip-1 | gzip-2 | gzip-3
          # gzip-4 | gzip-5 | gzip-6 | gzip-7 | gzip-8 | gzip-9 | lz4 | zle
          compression: 'lz4'
          # define devices to create pool with...can define multiple by
          # | sdb sdc sdd sde sdf | all on one line w/spaces
          devices:
            - '/dev/sdb'
            - '/dev/sdc'
          # define pool type... | basic (no-raid) | mirror | raidz |
          # raidz2 | raidz3
          type: mirror
          state: present
  roles:
    - role: ansible-zfs
  tasks:
